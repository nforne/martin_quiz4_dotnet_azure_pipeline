trigger:
  - main

variables:
  buildConfiguration: 'Release'
  projectPath: 'MyApp.csproj'   # <-- change to 'MyApp/MyApp.csproj' if needed
  artifactName: 'drop'

pool:
  name: 'Default'

steps:
  - checkout: self
    clean: true

  - script: |
      echo Agent: $(Agent.Name)
      echo Sources: $(Build.SourcesDirectory)
      dir /b
    displayName: 'Debug: list repo root files'

  - task: UseDotNet@2
    displayName: 'Use .NET SDK 8.x'
    inputs:
      packageType: 'sdk'
      version: '8.x'
      includePreview: false

  - task: Cache@2
    displayName: 'Cache NuGet packages (safe)'
    inputs:
      key: 'nuget | "$(Agent.OS)" | **/*.csproj'
      restoreKeys: |
        nuget | "$(Agent.OS)"
      path: $(NUGET_PACKAGES)

  - script: dotnet restore $(projectPath)
    displayName: 'Restore NuGet packages'

  - script: dotnet build $(projectPath) --configuration $(buildConfiguration) --no-restore --verbosity minimal
    displayName: 'Build'

  - script: dotnet publish $(projectPath) -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory) --no-build
    displayName: 'Publish to artifact staging directory'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish artifact'
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: '$(artifactName)'
      publishLocation: 'Container'
