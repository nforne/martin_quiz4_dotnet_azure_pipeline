trigger:
  - main

variables:
  buildConfiguration: 'Release'
  projectPath: 'MyApp.csproj'            # <-- update if your .csproj is in a subfolder (e.g. 'MyApp/MyApp.csproj')
  artifactName: 'drop'
  nugetCacheFolder: '$(Pipeline.Workspace)/.nuget/packages'  # concrete cache path

pool:
  name: 'Default'

steps:
  - checkout: self
    clean: true

  - script: |
      echo Agent: $(Agent.Name)
      echo Sources: $(Build.SourcesDirectory)
      echo Pipeline workspace: $(Pipeline.Workspace)
      dir /b
    displayName: 'Debug: list repo root files'

  - task: UseDotNet@2
    displayName: 'Use .NET SDK 8.x'
    inputs:
      packageType: 'sdk'
      version: '8.x'
      includePreview: false

  - task: PowerShell@2
    displayName: 'Prepare NuGet cache folder'
    inputs:
      targetType: 'inline'
      script: |
        $path = "$(nugetCacheFolder)"
        if (-not (Test-Path $path)) {
          New-Item -ItemType Directory -Force -Path $path | Out-Null
          Write-Host "Created NuGet cache folder: $path"
        } else {
          Write-Host "NuGet cache folder already exists: $path"
        }

  - task: Cache@2
    displayName: 'Cache NuGet packages (safe)'
    inputs:
      key: 'nuget | "$(Agent.OS)" | **/*.csproj'
      restoreKeys: |
        nuget | "$(Agent.OS)"
      path: '$(nugetCacheFolder)'

  - script: dotnet restore $(projectPath)
    displayName: 'Restore NuGet packages'
    env:
      NUGET_PACKAGES: '$(nugetCacheFolder)'

  - script: dotnet build $(projectPath) --configuration $(buildConfiguration) --no-restore --verbosity minimal
    displayName: 'Build'
    env:
      NUGET_PACKAGES: '$(nugetCacheFolder)'

  - script: dotnet publish $(projectPath) -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory) --no-build
    displayName: 'Publish to artifact staging directory'
    env:
      NUGET_PACKAGES: '$(nugetCacheFolder)'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish artifact'
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: '$(artifactName)'
      publishLocation: 'Container'
